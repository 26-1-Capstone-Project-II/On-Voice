name: OpenAI Code Review

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check secret
        shell: bash
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY secret is missing."
            exit 1
          fi

      - name: Build PR diff
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" \
            -- . \
            ':(exclude)package-lock.json' \
            ':(exclude)yarn.lock' \
            ':(exclude)pnpm-lock.yaml' \
            ':(exclude)dist/**' \
            ':(exclude)build/**' \
            > pr.diff

          if [ ! -s pr.diff ]; then
            echo "No meaningful diff found." > pr.diff
          fi

          python3 - <<'PY'
          from pathlib import Path

          p = Path("pr.diff")
          text = p.read_text(encoding="utf-8", errors="ignore")

          limit = 120000
          if len(text) > limit:
              text = text[:limit] + "\n\n[TRUNCATED]"

          p.write_text(text, encoding="utf-8")
          PY

      - name: Ask OpenAI for review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          diff_text = Path("pr.diff").read_text(encoding="utf-8", errors="ignore")

          system_prompt = (
              "You are a senior software engineer reviewing a GitHub pull request. "
              "Focus on bugs, regressions, security, performance, maintainability, "
              "and missing tests. Be concrete. The entire response must be written in Korean."
          )

          user_prompt = "\n".join([
              "Review the diff and return:",
              "1. A short summary",
              "2. Critical issues",
              "3. Improvement suggestions",
              "4. A final verdict",
              "",
              "Rules:",
              "- Be concrete and reference actual changed code patterns from the diff.",
              "- If there are no serious issues, say so clearly.",
              "- Keep the review concise but useful.",
              "- Format in Markdown.",
              "",
              "PR diff:",
              "```diff",
              diff_text,
              "```",
          ])

          body = {
              "model": "gpt-5.4-mini",
              "input": [
                  {
                      "role": "system",
                      "content": [
                          {"type": "input_text", "text": system_prompt}
                      ],
                  },
                  {
                      "role": "user",
                      "content": [
                          {"type": "input_text", "text": user_prompt}
                      ],
                  },
              ],
          }

          Path("openai_request.json").write_text(
              json.dumps(body, ensure_ascii=False),
              encoding="utf-8"
          )
          PY

          HTTP_STATUS=$(curl -sS -o openai_response.json -w "%{http_code}" \
            -X POST "https://api.openai.com/v1/responses" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -d @openai_request.json)

          echo "HTTP_STATUS=$HTTP_STATUS"
          cat openai_response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "OpenAI API request failed"
            exit 1
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          raw = Path("openai_response.json").read_text(encoding="utf-8")
          data = json.loads(raw)

          text = data.get("output_text")

          if not text:
              pieces = []
              for item in data.get("output", []):
                  for content in item.get("content", []):
                      if content.get("type") == "output_text":
                          pieces.append(content.get("text", ""))
              text = "\n".join(piece for piece in pieces if piece).strip()

          if not text:
              text = (
                  "OpenAI 응답을 파싱하지 못했습니다.\n\n```json\n"
                  + json.dumps(data, ensure_ascii=False, indent=2)[:6000]
                  + "\n```"
              )

          final = "## OpenAI 코드 리뷰\n\n<!-- openai-review-bot -->\n\n" + text
          Path("review.md").write_text(final, encoding="utf-8")
          PY

      - name: Create or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');
            const marker = '<!-- openai-review-bot -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
